<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クレーンゲーム</title>
</head>
<body>
    <div id="app"></div>

    <script>
        class CraneGameApp {
            constructor() {
                this.appContainer = document.getElementById('app');
                
                // クレーンの位置と状態
                this.craneX = 50;
                this.craneZ = 10;
                this.isMoving = false;
                
                // キーボードの入力状態
                this.keys = {
                    ArrowUp: false,
                    ArrowDown: false,
                    ArrowLeft: false,
                    ArrowRight: false
                };
                
                // 景品リスト
                this.prizes = ['🧸', '🎁', '🐼', '🐰', '💎', '👑'];
                
                this.render();
                this.attachEventListeners();
                this.startGameLoop();
                this.scatterPrizes();
            }
            
            createStyles() {
                const style = document.createElement('style');
                style.textContent = `
                    :root {
                        --arcade-pink: #ff7eb3;
                        --arcade-blue: #7eb3ff;
                        --machine-bg: #ffe6f2;
                        --dark-gray: #333;
                        --claw-color: #c0c0c0;
                    }
                    
                    * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                    }
                    
                    body {
                        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                        min-height: 100vh;
                        padding: 20px;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        color: var(--dark-gray);
                    }
                    
                    .container {
                        background: white;
                        border-radius: 20px;
                        padding: 30px;
                        width: 100%;
                        max-width: 450px;
                        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
                        text-align: center;
                    }
                    
                    h1 {
                        color: var(--arcade-pink);
                        margin-bottom: 5px;
                        font-size: 2em;
                        text-shadow: 2px 2px 0px rgba(255, 126, 179, 0.2);
                    }
                    
                    .subtitle {
                        color: #666;
                        font-size: 0.9em;
                        margin-bottom: 20px;
                    }
                    
                    .game-screen {
                        position: relative;
                        width: 100%;
                        height: 400px;
                        background: var(--machine-bg);
                        border: 8px solid var(--arcade-pink);
                        border-radius: 15px;
                        border-bottom-width: 30px;
                        overflow: hidden;
                        margin-bottom: 20px;
                        box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
                    }
                    
                    .game-screen::before {
                        content: '';
                        position: absolute;
                        top: 0; left: 0; right: 0; bottom: 0;
                        background: repeating-linear-gradient(
                            45deg,
                            transparent,
                            transparent 20px,
                            rgba(255, 255, 255, 0.5) 20px,
                            rgba(255, 255, 255, 0.5) 40px
                        );
                        z-index: 1;
                    }
                    
                    .crane-system {
                        position: absolute;
                        top: 10%;
                        left: 50%;
                        transform: translateX(-50%);
                        z-index: 10;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        transition: top 0.1s, left 0.1s;
                    }
                    
                    .wire {
                        width: 4px;
                        height: 20px;
                        background: #999;
                        transition: height 1s cubic-bezier(0.25, 0.1, 0.25, 1);
                    }
                    
                    .claw-base {
                        width: 40px;
                        height: 20px;
                        background: var(--arcade-blue);
                        border-radius: 5px;
                        border: 2px solid #5a8ecc;
                        position: relative;
                        z-index: 2;
                    }
                    
                    .prongs {
                        display: flex;
                        justify-content: space-between;
                        width: 70px;
                        margin-top: -5px;
                    }
                    
                    .prong {
                        width: 15px;
                        height: 40px;
                        border: 4px solid var(--claw-color);
                        border-top: none;
                        transition: transform 0.3s ease;
                    }
                    
                    .prong.left {
                        border-right: none;
                        border-radius: 0 0 0 15px;
                        transform-origin: top right;
                        transform: rotate(20deg);
                    }
                    
                    .prong.right {
                        border-left: none;
                        border-radius: 0 0 15px 0;
                        transform-origin: top left;
                        transform: rotate(-20deg);
                    }
                    
                    .crane-system.closed .prong.left { transform: rotate(0deg); }
                    .crane-system.closed .prong.right { transform: rotate(0deg); }
                    
                    .caught-prize {
                        position: absolute;
                        top: 35px;
                        font-size: 2.5em;
                        opacity: 0;
                        transition: opacity 0.2s;
                        pointer-events: none;
                    }
                    
                    .crane-system.has-prize .caught-prize { opacity: 1; }
                    
                    .prize-area {
                        position: absolute;
                        bottom: -10px;
                        width: 100%;
                        height: 100px;
                        z-index: 5;
                    }
                    
                    .scattered-prize {
                        position: absolute;
                        font-size: 3em;
                        filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
                    }
                    
                    .controls {
                        display: flex;
                        flex-direction: column;
                        gap: 15px;
                        align-items: center;
                    }
                    
                    .btn-go {
                        background: linear-gradient(135deg, #ff4757, #ff6b81);
                        color: white;
                        font-size: 1.8em;
                        font-weight: bold;
                        padding: 15px 60px;
                        border: none;
                        border-radius: 50px;
                        cursor: pointer;
                        box-shadow: 0 6px 0 #cf3a46, 0 10px 20px rgba(255, 71, 87, 0.4);
                        transition: all 0.1s ease;
                    }
                    
                    .btn-go:hover:not(:disabled) {
                        transform: translateY(2px);
                        box-shadow: 0 4px 0 #cf3a46, 0 8px 15px rgba(255, 71, 87, 0.4);
                    }
                    
                    .btn-go:active:not(:disabled) {
                        transform: translateY(6px);
                        box-shadow: 0 0 0 #cf3a46, 0 4px 5px rgba(255, 71, 87, 0.4);
                    }
                    
                    .btn-go:disabled {
                        background: #ccc;
                        box-shadow: 0 6px 0 #999;
                        cursor: not-allowed;
                        transform: none;
                    }
                    
                    .instructions {
                        display: flex;
                        gap: 10px;
                        justify-content: center;
                        align-items: center;
                        background: #f5f5f5;
                        padding: 10px 20px;
                        border-radius: 10px;
                        font-weight: bold;
                        color: #555;
                    }
                    
                    .key-icon {
                        background: white;
                        border: 2px solid #ddd;
                        border-radius: 5px;
                        padding: 2px 8px;
                        box-shadow: 0 2px 0 #ddd;
                    }
        
                    #resultMessage {
                        min-height: 30px;
                        font-size: 1.2em;
                        font-weight: bold;
                        color: var(--arcade-pink);
                        margin-top: 15px;
                    }
                `;
                document.head.appendChild(style);
            }
            
            render() {
                this.createStyles();
                
                const html = `
                    <div class="container">
                        <h1>🛸 クレーンゲーム</h1>
                        <div class="subtitle">前後左右（矢印キー）で狙いを定めてGO！</div>
                        
                        <div class="game-screen">
                            <div class="crane-system" id="craneSystem">
                                <div class="wire" id="craneWire"></div>
                                <div class="claw-base"></div>
                                <div class="prongs">
                                    <div class="prong left"></div>
                                    <div class="prong right"></div>
                                </div>
                                <div class="caught-prize" id="caughtPrize">🧸</div>
                            </div>
                            
                            <div class="prize-area" id="prizeArea">
                            </div>
                        </div>
                        
                        <div class="controls">
                            <div class="instructions">
                                操作: <span class="key-icon">↑</span><span class="key-icon">↓</span><span class="key-icon">←</span><span class="key-icon">→</span>
                            </div>
                            <button id="btnGo" class="btn-go">GO</button>
                            <div id="resultMessage"></div>
                        </div>
                    </div>
                `;
                
                this.appContainer.innerHTML = html;
                
                this.craneSystem = document.getElementById('craneSystem');
                this.craneWire = document.getElementById('craneWire');
                this.btnGo = document.getElementById('btnGo');
                this.resultMessage = document.getElementById('resultMessage');
                this.prizeArea = document.getElementById('prizeArea');
                this.caughtPrize = document.getElementById('caughtPrize');
            }
            
            scatterPrizes() {
                this.prizeArea.innerHTML = '';
                for (let i = 0; i < 15; i++) {
                    const prize = document.createElement('div');
                    prize.className = 'scattered-prize';
                    prize.textContent = this.prizes[Math.floor(Math.random() * this.prizes.length)];
                    
                    const left = Math.random() * 80 + 5;
                    const bottom = Math.random() * 40;
                    const rotate = Math.random() * 60 - 30;
                    
                    prize.style.left = `${left}%`;
                    prize.style.bottom = `${bottom}px`;
                    prize.style.transform = `rotate(${rotate}deg)`;
                    
                    this.prizeArea.appendChild(prize);
                }
            }
            
            attachEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        if (!this.isMoving) {
                            this.keys[e.key] = true;
                        }
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    if (this.keys.hasOwnProperty(e.key)) {
                        this.keys[e.key] = false;
                    }
                });
                
                this.btnGo.addEventListener('click', () => this.dropCrane());
            }
            
            startGameLoop() {
                setInterval(() => {
                    if (this.isMoving) return;
                    
                    const speed = 1.5;
                    let moved = false;
                    
                    if (this.keys.ArrowLeft) { this.craneX -= speed; moved = true; }
                    if (this.keys.ArrowRight) { this.craneX += speed; moved = true; }
                    if (this.keys.ArrowUp) { this.craneZ -= speed; moved = true; }
                    if (this.keys.ArrowDown) { this.craneZ += speed; moved = true; }
                    
                    this.craneX = Math.max(5, Math.min(95, this.craneX));
                    this.craneZ = Math.max(5, Math.min(45, this.craneZ));
                    
                    if (moved) {
                        this.updateCraneVisual();
                        this.resultMessage.textContent = '';
                    }
                }, 20);
            }
            
            updateCraneVisual() {
                this.craneSystem.style.left = `${this.craneX}%`;
                this.craneSystem.style.top = `${this.craneZ}%`;
            }
            
            dropCrane() {
                if (this.isMoving) return;
                
                this.isMoving = true;
                this.btnGo.disabled = true;
                this.resultMessage.textContent = 'アーム降下中...';
                
                const dropHeight = 250 - (this.craneZ * 2.5);
                this.craneWire.style.height = `${dropHeight}px`;
                
                setTimeout(() => {
                    this.craneSystem.classList.add('closed');
                    
                    const isSuccess = Math.random() < 0.5;
                    
                    if (isSuccess) {
                        const randomPrize = this.prizes[Math.floor(Math.random() * this.prizes.length)];
                        this.caughtPrize.textContent = randomPrize;
                        this.craneSystem.classList.add('has-prize');
                    }
                    
                    setTimeout(() => {
                        this.craneWire.style.height = '20px';
                        
                        setTimeout(() => {
                            if (isSuccess) {
                                this.resultMessage.style.color = '#2ecc71';
                                this.resultMessage.textContent = '🎉 おめでとう！景品ゲット！ 🎉';
                            } else {
                                this.resultMessage.style.color = '#e74c3c';
                                this.resultMessage.textContent = '💦 残念！アームがすっぽ抜けました...';
                            }
                            
                            this.resetCrane();
                            
                        }, 1000);
                    }, 600);
                }, 1000);
            }
            
            resetCrane() {
                setTimeout(() => {
                    this.craneSystem.classList.remove('closed');
                    this.craneSystem.classList.remove('has-prize');
                    this.isMoving = false;
                    this.btnGo.disabled = false;
                }, 1500);
            }
        }

        // ここでアプリを起動します
        window.craneApp = new CraneGameApp();
    </script>
</body>
</html>
